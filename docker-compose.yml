# ──────────────────────────────────────────────────────────────────────────
# NekoCafé 本地开发环境
# 用途：在本机一键启动全栈（reservation、member、postgres、redis、kafka）
#
# 快速启动：make up
# 验证健康：make healthcheck
# 运行测试：make test
# 停止清理：make down
# ──────────────────────────────────────────────────────────────────────────

# ── 公共重用片段 ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── 预约服务（Python / FastAPI）────────────────────────────────────────
  reservation:
    build:
      context: ./services/reservation
      target: runtime
    image: nekocafe-reservation:local
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: "postgresql://nekocafe:nekocafe@postgres:5432/reservation_db"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - nekocafe-net

  # ── 会员服务（Node.js / Express）───────────────────────────────────────
  member:
    build:
      context: ./services/member
      target: runtime
    image: nekocafe-member:local
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: "postgresql://nekocafe:nekocafe@postgres:5432/member_db"
      REDIS_URL: "redis://redis:6379/1"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - nekocafe-net

  # ── PostgreSQL 数据库 ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nekocafe
      POSTGRES_PASSWORD: nekocafe
      POSTGRES_MULTIPLE_DATABASES: "reservation_db,member_db"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nekocafe -d reservation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - nekocafe-net

  # ── Redis 缓存 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - nekocafe-net

  # ── Kafka 消息队列（KRaft 模式，无 ZooKeeper）──────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      # KRaft 模式配置（apache/kafka 使用 KAFKA_ 前缀，非 bitnami 的 KAFKA_CFG_）
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - nekocafe-net

# ── 卷 ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ── 网络 ────────────────────────────────────────────────────────────────
networks:
  nekocafe-net:
    driver: bridge
