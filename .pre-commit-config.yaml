# .pre-commit-config.yaml — NekoCafé 预提交钩子
# 在 git commit 前自动运行代码检查，防止低质量代码进入仓库
#
# 安装：pip install pre-commit && pre-commit install
# 手动运行所有钩子：pre-commit run --all-files

repos:
  # ── 通用检查：行尾空白、文件结尾换行、合并冲突标记 ────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: \.json$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Python：ruff（替代 flake8 + isort + pyupgrade） ────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^services/reservation/
      - id: ruff-format
        files: ^services/reservation/

  # ── Dockerfile：hadolint ───────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
        args:
          [
            --failure-threshold,
            warning,
            --ignore,
            DL3008,
            --ignore,
            DL3013,
            --ignore,
            DL3042,
            --ignore,
            SC2028,
          ]
        files: Dockerfile$

  # ── YAML：yamllint ─────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-data, '{extends: default, rules: {line-length: {max: 160}, document-start: disable, truthy: disable, indentation: {spaces: 2}}}']

  # ── Shell 脚本：shellcheck ─────────────────────────────────────
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: \.sh$

  # ── K8s：kube-linter（检查 Helm 模板 / K8s manifests）──────────
  - repo: https://github.com/stackrox/kube-linter
    rev: 0.6.8
    hooks:
      - id: kube-linter
        args: [lint, infra/, --do-not-auto-add-defaults]
        pass_filenames: false
        verbose: true
