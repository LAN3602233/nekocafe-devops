name: CD
# ──────────────────────────────────────────────────────────────────────────
# NekoCafé CD 流水线（教学环境 dry-run 模式）
#
# 触发条件：
#   - 推送到 main 分支 → Helm 模板验证（无真实 K8s）
#   - 打 tag（v*）     → 金丝雀发布模拟（5% → 50% → 100% dry-run）
#
# 教学说明：
#   当前无真实 K8s 集群，所有部署 Job 仅做 Helm 模板渲染验证。
#   连接真实集群时：取消注释 kubeconfig 步骤并替换 helm template 为 helm upgrade。
#
# 符合 D3-1 §6 渐进式发布策略要求
# ──────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  HELM_VERSION: "3.14.4"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Helm 模板校验（必过，阻断）
  # ────────────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint & kube-linter
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: |
          helm lint ./infra/helm --strict
          echo "Helm lint passed ✓"

      - name: Install kube-linter
        run: |
          curl -L https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz | tar xz
          sudo mv kube-linter /usr/local/bin/

      - name: Render Helm template and run kube-linter
        run: |
          # 渲染 dev 环境配置供 kube-linter 检查
          helm template test-release ./infra/helm \
            -f ./infra/helm/values-dev.yaml \
            --set serviceType=reservation \
            --set image.tag=test \
            --set canary.enabled=false \
            > /tmp/rendered.yaml

          kube-linter lint /tmp/rendered.yaml --do-not-auto-add-defaults
          echo "kube-linter passed ✓"

  # ────────────────────────────────────────────────────────────────────────
  # Dev 环境模板验证（main 分支推送触发，dry-run 模式）
  # 生产环境时替换为 helm upgrade --install（见注释）
  # ────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to dev (dry-run)
    runs-on: ubuntu-latest
    needs: helm-lint
    if: github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: https://dev.nekocafe.internal
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # 生产环境取消注释以下步骤:
      # - name: Configure kubeconfig (dev)
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config
      #     chmod 600 ~/.kube/config

      - name: Compute image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Helm template validation — reservation (dev)
        working-directory: ./infra/helm
        run: |
          echo ">>> Helm template dry-run: reservation (dev)"
          helm template nekocafe-reservation . \
            -f values-dev.yaml \
            --set serviceType=reservation \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-reservation \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/dev_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/dev-reservation.yaml
          echo "  → reservation template rendered: $(wc -l < /tmp/dev-reservation.yaml) lines"
          echo "  → Deployment replicas: $(grep 'replicas:' /tmp/dev-reservation.yaml | head -1)"
          echo "reservation dry-run PASSED ✓"

      - name: Helm template validation — member (dev)
        working-directory: ./infra/helm
        run: |
          echo ">>> Helm template dry-run: member (dev)"
          helm template nekocafe-member . \
            -f values-dev.yaml \
            --set serviceType=member \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-member \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/dev_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/dev-member.yaml
          echo "  → member template rendered: $(wc -l < /tmp/dev-member.yaml) lines"
          echo "member dry-run PASSED ✓"

      - name: Dev deploy summary (dry-run)
        run: |
          echo "============================================"
          echo "  Dev 环境 Helm 模板验证完成 (dry-run)"
          echo "  Image tag: sha-${{ steps.tag.outputs.tag }}"
          echo "  已验证: reservation + member K8s manifests"
          echo "  状态: PASSED (教学环境无需真实集群)"
          echo "============================================"

  # ────────────────────────────────────────────────────────────────────────
  # 金丝雀发布模拟（打 tag v* 时触发，dry-run 模式）
  # 流程：模板验证 → 5% 模拟 → "观察" → 50% 模拟 → "观察" → 100% 全量
  # 生产环境时取消注释 kubeconfig + 替换 helm template 为 helm upgrade
  # 符合 D3-1 §6 金丝雀发布策略
  # ────────────────────────────────────────────────────────────────────────
  canary-prod:
    name: Canary → prod (dry-run)
    runs-on: ubuntu-latest
    needs: helm-lint
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: prod
      url: https://nekocafe.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # 生产环境取消注释:
      # - name: Configure kubeconfig (prod)
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
      #     chmod 600 ~/.kube/config

      - name: Extract version tag
        id: ver
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # ── 步骤 1：金丝雀 5% 模板验证 ─────────────────────────────────
      - name: 'Phase 1: Canary 5% template validation'
        working-directory: ./infra/helm
        run: |
          echo ">>> 金丝雀 5% 模板验证 (版本 ${{ steps.ver.outputs.tag }})"
          helm template nekocafe-reservation-canary . \
            -f values-prod.yaml \
            --set serviceType=reservation \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-reservation \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/prod_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/canary-5pct.yaml
          echo "  → 金丝雀模板: $(wc -l < /tmp/canary-5pct.yaml) lines"
          echo "  → canary.weight: 5"
          echo "canary 5% template PASSED ✓"

      # ── 步骤 2：模拟观察期 ─────────────────────────────────────────
      - name: 'Phase 2: Observe canary metrics (simulated 2min)'
        run: |
          echo ">>> 金丝雀 5% 观察期 (模拟)"
          echo "  在生产环境中会查询 Prometheus:"
          echo "    - 错误率: rate(5xx)/rate(total) < 1%"
          echo "    - P95 延迟: < 300ms"
          echo "  教学环境: 直接通过观察 ✓"
          echo "OK: 错误率 0.00% 正常，继续放量"

      # ── 步骤 3：放量到 50% 模板验证 ───────────────────────────────
      - name: 'Phase 3: Canary 50% template validation'
        working-directory: ./infra/helm
        run: |
          echo ">>> 放量至 50% 模板验证"
          helm template nekocafe-reservation-canary . \
            -f values-prod.yaml \
            --set serviceType=reservation \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-reservation \
            --set canary.enabled=true \
            --set canary.weight=50 \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/prod_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/canary-50pct.yaml
          echo "  → canary.weight: 50"
          echo "canary 50% template PASSED ✓"

      # ── 步骤 4：全量发布 100% 模板验证 ────────────────────────────
      - name: 'Phase 4: Full rollout 100% template validation'
        working-directory: ./infra/helm
        run: |
          echo ">>> 全量发布: 将金丝雀版本提升为 stable"

          # 渲染 stable deployment 模板
          helm template nekocafe-reservation . \
            -f values-prod.yaml \
            --set serviceType=reservation \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-reservation \
            --set canary.enabled=false \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/prod_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/prod-stable.yaml
          echo "  → stable template: $(wc -l < /tmp/prod-stable.yaml) lines"
          echo "full rollout 100% template PASSED ✓"

      # member 服务同步验证
      - name: 'Phase 5: Member rollout template validation'
        working-directory: ./infra/helm
        run: |
          echo ">>> Member 服务全量发布模板验证"
          helm template nekocafe-member . \
            -f values-prod.yaml \
            --set serviceType=member \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-member \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/prod_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/prod-member.yaml
          echo "  → member template: $(wc -l < /tmp/prod-member.yaml) lines"
          echo "member rollout template PASSED ✓"

      - name: Canary rollout summary (dry-run)
        run: |
          echo "============================================"
          echo "  金丝雀发布流程验证完成 (dry-run)"
          echo "  版本: ${{ steps.ver.outputs.tag }}"
          echo "  流程: 5% → 观察 → 50% → 100%"
          echo "  步骤:"
          echo "    ✓ Phase 1: Canary 5% template"
          echo "    ✓ Phase 2: Metrics observation (simulated)"
          echo "    ✓ Phase 3: Canary 50% template"
          echo "    ✓ Phase 4: Full rollout 100% template"
          echo "    ✓ Phase 5: Member rollout template"
          echo "  状态: PASSED (教学环境无需真实集群)"
          echo "============================================"

  # ────────────────────────────────────────────────────────────────────────
  # Staging 环境模板验证（打 tag v* 时触发，dry-run 模式）
  # 生产环境时取消注释 kubeconfig + 替换 helm template 为 helm upgrade
  # ────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging (dry-run)
    runs-on: ubuntu-latest
    needs: helm-lint
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: staging
      url: https://staging.nekocafe.internal
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # 生产环境取消注释:
      # - name: Configure kubeconfig (staging)
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
      #     chmod 600 ~/.kube/config

      - name: Extract version tag
        id: ver
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Helm template validation — reservation (staging)
        working-directory: ./infra/helm
        run: |
          echo ">>> Helm template dry-run: reservation (staging)"
          helm template nekocafe-reservation . \
            -f values-staging.yaml \
            --set serviceType=reservation \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-reservation \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/staging_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/staging-reservation.yaml
          echo "  → reservation staging template: $(wc -l < /tmp/staging-reservation.yaml) lines"
          echo "reservation staging dry-run PASSED ✓"

      - name: Helm template validation — member (staging)
        working-directory: ./infra/helm
        run: |
          echo ">>> Helm template dry-run: member (staging)"
          helm template nekocafe-member . \
            -f values-staging.yaml \
            --set serviceType=member \
            --set image.tag=${{ steps.ver.outputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nekocafe-member \
            --set env.DATABASE_URL="postgresql://mock:mock@mock:5432/staging_db" \
            --set env.REDIS_URL="redis://mock:6379/0" \
            --set env.KAFKA_BOOTSTRAP_SERVERS="mock-kafka:9092" \
            > /tmp/staging-member.yaml
          echo "  → member staging template: $(wc -l < /tmp/staging-member.yaml) lines"
          echo "member staging dry-run PASSED ✓"

      - name: Staging deploy summary (dry-run)
        run: |
          echo "============================================"
          echo "  Staging 环境 Helm 模板验证完成 (dry-run)"
          echo "  Version: ${{ steps.ver.outputs.tag }}"
          echo "  已验证: reservation + member (staging configs)"
          echo "  状态: PASSED (教学环境无需真实集群)"
          echo "============================================"
