# ──────────────────────────────────────────────────────────────────────────
# Staging 环境覆盖值
# 用途：合并到 main 后自动部署，供 QA 验证（数据每周从 prod 备份脱敏恢复）
# ──────────────────────────────────────────────────────────────────────────

replicaCount: 2

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilization: 70

canary:
  enabled: false

ingress:
  enabled: true
  host: staging.nekocafe.internal
  tls:
    enabled: false

env:
  DATABASE_URL: "postgresql://nekocafe:nekocafe@postgres-staging:5432/placeholder_db"
  REDIS_URL: "redis://redis-staging:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-staging:9092"
  PORT: "8080"

pdb:
  enabled: true
  minAvailable: 1

probe:
  liveness:
    initialDelaySeconds: 30
  readiness:
    initialDelaySeconds: 5

serviceMonitor:
  enabled: true
  interval: 30s
