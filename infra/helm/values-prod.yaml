# ──────────────────────────────────────────────────────────────────────────
# Production 环境覆盖值
# 用途：打 tag 后金丝雀发布，逐步放量至 100%
# ──────────────────────────────────────────────────────────────────────────

replicaCount: 4

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 16
  targetCPUUtilization: 60

canary:
  enabled: false       # 金丝雀通过独立 Helm release 管理
  weight: 0

ingress:
  enabled: true
  host: nekocafe.example.com
  tls:
    enabled: true
    secretName: nekocafe-prod-tls

env:
  DATABASE_URL: ""    # 通过 GitHub Secrets 注入，严禁硬编码
  REDIS_URL: ""        # 通过 GitHub Secrets 注入
  KAFKA_BOOTSTRAP_SERVERS: ""  # 通过 GitHub Secrets 注入
  PORT: "8080"

pdb:
  enabled: true
  minAvailable: 2

probe:
  liveness:
    initialDelaySeconds: 30
  readiness:
    initialDelaySeconds: 5

serviceMonitor:
  enabled: true
  interval: 15s

# 安全上下文：生产环境强制非 root 运行
security:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true

# Prod 特定节点调度（可选）
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: "{{ .Release.Name }}"
          topologyKey: kubernetes.io/hostname
