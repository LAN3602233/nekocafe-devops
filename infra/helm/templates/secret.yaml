{{/* ────────────────────────────────────────────────────────────────────────
Secret 模板 — 敏感配置（通过 Helm 的 --set 或 values 注入 GitHub Secrets）
符合 D3-1 §8 安全基线：Secret 严禁硬编码
─────────────────────────────────────────────────────────────────────── */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app: {{ .Release.Name }}
    service: {{ .Values.serviceType }}
type: Opaque
stringData:
  database-url: {{ .Values.env.DATABASE_URL | quote }}
  redis-url: {{ .Values.env.REDIS_URL | quote }}
  kafka-bootstrap-servers: {{ .Values.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
