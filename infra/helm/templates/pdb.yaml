{{/* ────────────────────────────────────────────────────────────────────────
PodDisruptionBudget 模板
  - 仅在 pdb.enabled=true 时生成
─────────────────────────────────────────────────────────────────────── */}}
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-pdb
  labels:
    app: {{ .Release.Name }}
    service: {{ .Values.serviceType }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
{{- end }}
