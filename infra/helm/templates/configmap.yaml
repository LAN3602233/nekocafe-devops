{{/* ────────────────────────────────────────────────────────────────────────
ConfigMap 模板 — 非敏感配置
─────────────────────────────────────────────────────────────────────── */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
    service: {{ .Values.serviceType }}
data:
  PORT: {{ .Values.env.PORT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | default "info" | quote }}
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT | default "production" | quote }}
  {{- if eq .Values.serviceType "reservation" }}
  CACHE_TTL_SECONDS: "60"
  MAX_TABLES: "50"
  {{- end }}
  {{- if eq .Values.serviceType "member" }}
  POINTS_PER_RESERVATION: "10"
  MAX_RECORDS_PER_PAGE: "100"
  {{- end }}
